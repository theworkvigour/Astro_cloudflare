name: CI/CD - Build & Deploy to Cloudflare Workers

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  check-astro:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn run check:astro

  build-and-deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [check-astro]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: corepack enable
      - run: yarn install --immutable

      - name: Build
        run: yarn run build

      - name: Inject bindings into wrangler.ci.json
        run: |
          cd dist/server
          node -e "
            const c = require('./wrangler.json');
            delete c.configPath; delete c.userConfigPath;
            c.vectorize = [{ binding: 'VECTORIZE', index_name: 'ai-index' }];
            c.ai = { binding: 'AI' };
            require('fs').writeFileSync('wrangler.ci.json', JSON.stringify(c, null, 2));
            console.log('✓ Injected VECTORIZE + AI bindings');
          "

      - name: Ensure KV namespace exists
        run: |
          yarn wrangler kv namespace create "wavefella-session" 2>/dev/null || true

      - name: Inject KV namespace ID
        run: |
          cd dist/server
          KV_ID=$(yarn wrangler kv namespace list 2>/dev/null | node -e "
            let d=''; process.stdin.on('data',c=>d+=c); process.stdin.on('end',()=>{
              try { const list=JSON.parse(d); const ns=list.find(n=>n.title==='wavefella-session'); if(ns) process.stdout.write(ns.id); } catch(e){}
            })
          ")
          if [ -n "$KV_ID" ]; then
            node -e "
              const c = require('./wrangler.ci.json');
              c.kv_namespaces = [{ binding: 'SESSION', id: '$KV_ID' }];
              require('fs').writeFileSync('wrangler.ci.json', JSON.stringify(c, null, 2));
              console.log('✓ Injected SESSION KV id=' + '$KV_ID');
            "
          else
            echo 'ERROR: could not find KV namespace ID'
            exit 1
          fi

      - name: Deploy to Cloudflare Workers
        run: |
          cd dist/server
          yarn wrangler deploy --config wrangler.ci.json --name wavefella > /tmp/deploy.log 2>&1
          rc=$?; cat /tmp/deploy.log; exit $rc
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Upload deploy log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-log
          path: /tmp/deploy.log

      - name: Set SESSION_SECRET on Worker
        run: |
          cd dist/server && \
          echo "${{ secrets.SESSION_SECRET }}" | \
            yarn wrangler secret put SESSION_SECRET \
              --config wrangler.ci.json \
              --name wavefella 2>&1
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      # Note: All locale URLs use path-based format: /de/, /fr/, etc.
      # No subdomain routing is needed.
