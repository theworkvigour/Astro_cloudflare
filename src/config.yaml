site:
  name: Wavefella
  site: 'https://alluredna.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: ''

# Default SEO metadata
metadata:
  title:
    default: Wavefella — Inflatable Boats, SUPs & Water Sports Gear
    template: '%s — Wavefella'
  description: 'Premium inflatable boats, SUPs, and water sports gear. Dinghies, RIBs, river boats, commercial rescue vessels, and accessories for every adventure.'
  keywords:
    - Wavefella
    - inflatable boat
    - SUP
    - paddleboard
    - RIB
    - dinghy
    - river boat
    - marine
  author: Wavefella
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Wavefella
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
    locale: en_US
  twitter:
    handle: '@wavefella'
    site: '@wavefella'
    cardType: summary_large_image

i18n:
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/news/%slug%'
      robots:
        index: true
        follow: true

    list:
      isEnabled: true
      pathname: 'news'
      robots:
        index: true
        follow: true

    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true
        follow: true

    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false
        follow: true

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

  products:
    isEnabled: true
    productsPerPage: 12
    product:
      isEnabled: true
      permalink: '/products/%slug%'
      robots:
        index: true
        follow: true
    list:
      isEnabled: true
      pathname: 'products'
      robots:
        index: true
        follow: true

analytics:
  vendors:
    googleAnalytics:
      id: null

siteSettings:
  siteName: Wavefella
  siteTagline: 'Premium Inflatable Boats, SUPs & Water Sports Gear'
  siteDescription: 'Wavefella designs and manufactures premium inflatable boats, stand-up paddleboards, and water sports gear. Founded in 2012, trusted by adventurers worldwide.'
  organization:
    name: Wavefella
    logo: ''
    contactEmail: info@wavefella.com
    contactPhone: '+1 (213) 557-7888'
    address: '5067 Saddleback St, Montclair, CA 91763, USA'
  socialLinks:
    - platform: youtube
      url: 'https://www.youtube.com/@Wavefella'
    - platform: x
      url: 'https://x.com/wavefella'
    - platform: instagram
      url: 'https://www.instagram.com/wavefellaco'
    - platform: facebook
      url: 'https://www.facebook.com/wavefella'
    - platform: rss
      url: /rss.xml

ui:
  theme: 'system'
