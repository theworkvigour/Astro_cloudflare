site:
  name: Vectoflare
  site: 'https://alluredna.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: ''

# Default SEO metadata
metadata:
  title:
    default: Vectoflare — Modern Solutions for Inflatable & Engineered Products
    template: '%s — Vectoflare'
  description: 'Vectoflare designs and manufactures premium inflatable boats, RIBs, and engineered products. Explore our catalog, technical specs, and resources for professionals and enthusiasts.'
  keywords:
    - Vectoflare
    - inflatable boat
    - RIB
    - PVC
    - marine
    - engineering
  author: Vectoflare
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Vectoflare
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
    locale: en_US
  twitter:
    handle: '@vectoflare'
    site: '@vectoflare'
    cardType: summary_large_image

i18n:
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/news/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true
        follow: true

    list:
      isEnabled: true
      pathname: 'news' # News main path
      robots:
        index: true
        follow: true

    category:
      isEnabled: true
      pathname: 'category' # /category/<slug>
      robots:
        index: true
        follow: true

    tag:
      isEnabled: true
      pathname: 'tag' # /tag/<slug>
      robots:
        index: false
        follow: true

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

  products:
    isEnabled: true
    productsPerPage: 12
    product:
      isEnabled: true
      permalink: '/products/%slug%'
      robots:
        index: true
        follow: true
    list:
      isEnabled: true
      pathname: 'products'
      robots:
        index: true
        follow: true

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

# Site settings — controls Organization schema (sameAs, logo, contact) and social links
siteSettings:
  siteName: Vectoflare
  siteTagline: 'Premium inflatable boats, RIBs and engineered products'
  siteDescription: 'Vectoflare designs and manufactures premium inflatable boats, RIBs, and engineered products. Explore our catalog, technical specs, and resources for professionals and enthusiasts.'
  organization:
    name: Vectoflare
    logo: ''
    contactEmail: info@vectoflare.com
    contactPhone: '+86 133 0532 4192'
    address: 'Qingdao, China'
  socialLinks:
    - platform: github
      url: 'https://github.com/theworkvigour'
    - platform: rss
      url: /rss.xml

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
