site:
  name: Wavefella
  site: 'https://alluredna.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: ''

# Default SEO metadata
metadata:
  title:
    default: Wavefella — Soluciones modernas para barcos inflables y productos técnicos
    template: '%s — Wavefella'
  description: 'Wavefella diseña y fabrica barcos inflables, RIB y productos técnicos de primera calidad. Explore nuestro catálogo, especificaciones técnicas y recursos.'
  keywords:
    - Wavefella
    - barco inflable
    - RIB
    - PVC
    - marino
    - ingeniería
  author: Wavefella
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Wavefella
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
    locale: es_ES
  twitter:
    handle: '@Wavefella'
    site: '@Wavefella'
    cardType: summary_large_image

i18n:
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/news/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true
        follow: true

    list:
      isEnabled: true
      pathname: 'news' # News main path
      robots:
        index: true
        follow: true

    category:
      isEnabled: true
      pathname: 'category' # /category/<slug>
      robots:
        index: true
        follow: true

    tag:
      isEnabled: true
      pathname: 'tag' # /tag/<slug>
      robots:
        index: false
        follow: true

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

  products:
    isEnabled: true
    productsPerPage: 12
    product:
      isEnabled: true
      permalink: '/products/%slug%'
      robots:
        index: true
        follow: true
    list:
      isEnabled: true
      pathname: 'products'
      robots:
        index: true
        follow: true

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"

# ── Per-language site settings ─────────────────────────────────
siteSettings:
  siteName: 'Wavefella'
  siteTagline: 'Wavefella — Premium Inflatable Boats, SUPs & Water Sports Gear'
  siteDescription: 'Wavefella designs and manufactures premium inflatable boats, stand-up paddleboards, and water sports gear.'
  organization:
    name: 'Wavefella'
    logo: ''
    contactEmail: info@wavefella.com
    contactPhone: '+1 (213) 557-7888'
    address: '5067 Saddleback St, Montclair, CA 91763, USA'