site:
  name: Wavefella
  site: 'https://alluredna.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: ''

# Default SEO metadata
metadata:
  title:
    default: Wavefella — 充气艇与工程产品的现代化解决方案
    template: '%s — Wavefella'
  description: 'Wavefella 设计并制造高品质充气艇、RIB 及工程产品。浏览我们的产品目录、技术规格和专业资源。'
  keywords:
    - Wavefella
    - 充气艇
    - RIB
    - PVC
    - 船舶
    - 工程
  author: Wavefella
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Wavefella
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
    locale: zh_CN
  twitter:
    handle: '@Wavefella'
    site: '@Wavefella'
    cardType: summary_large_image

i18n:
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/news/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true
        follow: true

    list:
      isEnabled: true
      pathname: 'news' # News main path
      robots:
        index: true
        follow: true

    category:
      isEnabled: true
      pathname: 'category' # /category/<slug>
      robots:
        index: true
        follow: true

    tag:
      isEnabled: true
      pathname: 'tag' # /tag/<slug>
      robots:
        index: false
        follow: true

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

  products:
    isEnabled: true
    productsPerPage: 12
    product:
      isEnabled: true
      permalink: '/products/%slug%'
      robots:
        index: true
        follow: true
    list:
      isEnabled: true
      pathname: 'products'
      robots:
        index: true
        follow: true

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
