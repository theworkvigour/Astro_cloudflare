site:
  name: Wavefella
  site: 'https://alluredna.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: ''

# Default SEO metadata
metadata:
  title:
    default: Wavefella — Moderne Lösungen für Schlauchboote und technische Produkte
    template: '%s — Wavefella'
  description: 'Wavefella entwickelt und fertigt hochwertige Schlauchboote, RIBs und technische Produkte. Entdecken Sie unseren Katalog, technische Daten und Ressourcen.'
  keywords:
    - Wavefella
    - Schlauchboot
    - RIB
    - PVC
    - Marine
    - Ingenieurwesen
  author: Wavefella
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Wavefella
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
    locale: de_DE
  twitter:
    handle: '@Wavefella'
    site: '@Wavefella'
    cardType: summary_large_image

i18n:
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/news/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true
        follow: true

    list:
      isEnabled: true
      pathname: 'news' # News main path
      robots:
        index: true
        follow: true

    category:
      isEnabled: true
      pathname: 'category' # /category/<slug>
      robots:
        index: true
        follow: true

    tag:
      isEnabled: true
      pathname: 'tag' # /tag/<slug>
      robots:
        index: false
        follow: true

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

  products:
    isEnabled: true
    productsPerPage: 12
    product:
      isEnabled: true
      permalink: '/products/%slug%'
      robots:
        index: true
        follow: true
    list:
      isEnabled: true
      pathname: 'products'
      robots:
        index: true
        follow: true

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"

# ── Per-language site settings ─────────────────────────────────
siteSettings:
  siteName: 'Wavefella'
  siteTagline: 'Wavefella — TODO: translate tagline to Deutsch'
  siteDescription: 'TODO: translate site description to Deutsch'
  organization:
    name: 'Wavefella'
    logo: ''
    contactEmail: info@wavefella.com
    contactPhone: '+1 (213) 557-7888'
    address: '5067 Saddleback St, Montclair, CA 91763, USA'  # TODO: translate address to Deutsch if localized address exists
  i18n:
    language: de
  socialLinks:
    - platform: youtube
      url: 'https://www.youtube.com/@Wavefella'
    - platform: x
      url: 'https://x.com/wavefella'
    - platform: instagram
      url: 'https://www.instagram.com/wavefellaco'
    - platform: facebook
      url: 'https://www.facebook.com/wavefella'
    - platform: rss
      url: /rss.xml
