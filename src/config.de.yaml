site:
  name: Vectoflare
  site: 'https://vectoflare.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: ''

# Default SEO metadata
metadata:
  title:
    default: Vectoflare — Moderne Lösungen für Schlauchboote und technische Produkte
    template: '%s — Vectoflare'
  description: 'Vectoflare entwickelt und fertigt hochwertige Schlauchboote, RIBs und technische Produkte. Entdecken Sie unseren Katalog, technische Daten und Ressourcen.'
  keywords:
    - Vectoflare
    - Schlauchboot
    - RIB
    - PVC
    - Marine
    - Ingenieurwesen
  author: Vectoflare
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Vectoflare
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
    locale: de_DE
  twitter:
    handle: '@vectoflare'
    site: '@vectoflare'
    cardType: summary_large_image

i18n:
  language: de
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/news/%slug%' # Variables: %slug%, %year%, %month%, %day%, %hour%, %minute%, %second%, %category%
      robots:
        index: true
        follow: true

    list:
      isEnabled: true
      pathname: 'news' # News main path
      robots:
        index: true
        follow: true

    category:
      isEnabled: true
      pathname: 'category' # /category/<slug>
      robots:
        index: true
        follow: true

    tag:
      isEnabled: true
      pathname: 'tag' # /tag/<slug>
      robots:
        index: false
        follow: true

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

  products:
    isEnabled: true
    productsPerPage: 12
    product:
      isEnabled: true
      permalink: '/products/%slug%'
      robots:
        index: true
        follow: true
    list:
      isEnabled: true
      pathname: 'products'
      robots:
        index: true
        follow: true

analytics:
  vendors:
    googleAnalytics:
      id: null # or "G-XXXXXXXXXX"

ui:
  theme: 'system' # Values: "system" | "light" | "dark" | "light:only" | "dark:only"
