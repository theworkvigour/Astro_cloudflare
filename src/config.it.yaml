site:
  name: Wavefella
  site: 'https://alluredna.com'
  base: '/'
  trailingSlash: false

  googleSiteVerificationId: ''

metadata:
  title:
    default: Wavefella — Soluzioni moderne per gommoni e prodotti tecnici
    template: '%s — Wavefella'
  description: 'Wavefella progetta e produce gommoni, RIB e prodotti tecnici di alta qualità. Scopri il nostro catalogo, le specifiche tecniche e le risorse.'
  keywords:
    - Wavefella
    - gommone
    - RIB
    - PVC
    - nautica
    - ingegneria
  author: Wavefella
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Wavefella
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
    locale: it_IT
  twitter:
    handle: '@Wavefella'
    site: '@Wavefella'
    cardType: summary_large_image

i18n:
  textDirection: ltr

apps:
  blog:
    isEnabled: true
    postsPerPage: 6

    post:
      isEnabled: true
      permalink: '/news/%slug%'
      robots:
        index: true
        follow: true

    list:
      isEnabled: true
      pathname: 'news'
      robots:
        index: true
        follow: true

    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true
        follow: true

    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false
        follow: true

    isRelatedPostsEnabled: true
    relatedPostsCount: 4

  products:
    isEnabled: true
    productsPerPage: 12
    product:
      isEnabled: true
      permalink: '/products/%slug%'
      robots:
        index: true
        follow: true
    list:
      isEnabled: true
      pathname: 'products'
      robots:
        index: true
        follow: true

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'system'

# ── Per-language site settings ─────────────────────────────────
siteSettings:
  siteName: 'Wavefella'
  siteTagline: 'Wavefella — TODO: translate tagline to Italiano'
  siteDescription: 'TODO: translate site description to Italiano'
  organization:
    name: 'Wavefella'
    logo: ''
    contactEmail: info@wavefella.com
    contactPhone: '+1 (213) 557-7888'
    address: '5067 Saddleback St, Montclair, CA 91763, USA'  # TODO: translate address to Italiano if localized address exists
  i18n:
    language: it
  socialLinks:
    - platform: youtube
      url: 'https://www.youtube.com/@Wavefella'
    - platform: x
      url: 'https://x.com/wavefella'
    - platform: instagram
      url: 'https://www.instagram.com/wavefellaco'
    - platform: facebook
      url: 'https://www.facebook.com/wavefella'
    - platform: rss
      url: /rss.xml
