site:
  name: Wavefella
  site: 'https://Wavefella.com'
  base: '/'
  trailingSlash: false
  googleSiteVerificationId: ''

metadata:
  title:
    default: Wavefella —العربية
    template: '%s —Wavefella'
  description: 'Wavefella —العربية'
  keywords:
    - Wavefella
  author: Wavefella
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Wavefella
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
    locale: ar_AR
  twitter:
    handle: '@Wavefella'
    site: '@Wavefella'
    cardType: summary_large_image

i18n:
  language: ar
  textDirection: rtl

apps:
  blog:
    isEnabled: true
    postsPerPage: 6
    post:
      isEnabled: true
      permalink: '/news/%slug%'
      robots:
        index: true
        follow: true
    list:
      isEnabled: true
      pathname: 'news'
      robots:
        index: true
        follow: true
  products:
    isEnabled: true
    productsPerPage: 12
    product:
      isEnabled: true
      permalink: '/products/%slug%'
      robots:
        index: true
        follow: true
    list:
      isEnabled: true
      pathname: 'products'
      robots:
        index: true
        follow: true

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'system'

# ── Per-language site settings ─────────────────────────────────
siteSettings:
  siteName: 'Wavefella — ويففيلا'
  siteTagline: 'Wavefella — ويففيلا — TODO: translate tagline to العربية'
  siteDescription: 'TODO: translate site description to العربية'
  organization:
    name: 'Wavefella — ويففيلا'
    logo: ''
    contactEmail: info@wavefella.com
    contactPhone: '+1 (213) 557-7888'
    address: '5067 Saddleback St, Montclair, CA 91763, USA'  # TODO: translate address to العربية if localized address exists
  i18n:
    language: ar
    textDirection: rtl
  socialLinks:
    - platform: youtube
      url: 'https://www.youtube.com/@Wavefella'
    - platform: x
      url: 'https://x.com/wavefella'
    - platform: instagram
      url: 'https://www.instagram.com/wavefellaco'
    - platform: facebook
      url: 'https://www.facebook.com/wavefella'
    - platform: rss
      url: /rss.xml
