site:
  name: Vectoflare
  site: 'https://vectoflare.com'
  base: '/'
  trailingSlash: false
  googleSiteVerificationId: ''

metadata:
  title:
    default: Vectoflare — العربية
    template: '%s — Vectoflare'
  description: 'Vectoflare — العربية'
  keywords:
    - Vectoflare
  author: Vectoflare
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Vectoflare
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
    locale: ar_AR
  twitter:
    handle: '@vectoflare'
    site: '@vectoflare'
    cardType: summary_large_image

i18n:
  language: ar
  textDirection: rtl

apps:
  blog:
    isEnabled: true
    postsPerPage: 6
    post:
      isEnabled: true
      permalink: '/news/%slug%'
      robots:
        index: true
        follow: true
    list:
      isEnabled: true
      pathname: 'news'
      robots:
        index: true
        follow: true
  products:
    isEnabled: true
    productsPerPage: 12
    product:
      isEnabled: true
      permalink: '/products/%slug%'
      robots:
        index: true
        follow: true
    list:
      isEnabled: true
      pathname: 'products'
      robots:
        index: true
        follow: true

analytics:
  vendors:
    googleAnalytics:
      id: null

ui:
  theme: 'system'
