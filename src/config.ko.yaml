site:
  name: Wavefella
  site: 'https://alluredna.com'
  base: '/'
  trailingSlash: false
  googleSiteVerificationId: ''
metadata:
  title:
    default: Wavefella — 인플레이터블 보트 및 기술 제품을 위한 최신 솔루션
    template: '%s — Wavefella'
  description: 'Wavefella는 고품질 인플레이터블 보트, RIB 및 기술 제품을 설계 및 제조합니다. 카탈로그, 사양 및 리소스를 확인하세요.'
  keywords:
    - Wavefella
    - 인플레이터블 보트
    - RIB
    - PVC
    - 마린
    - 엔지니어링
  author: Wavefella
  robots:
    index: true
    follow: true
  openGraph:
    site_name: Wavefella
    images:
      - url: '~/assets/images/default.png'
        width: 1200
        height: 628
    type: website
    locale: ko_KR
  twitter:
    handle: '@Wavefella'
    site: '@Wavefella'
    cardType: summary_large_image
i18n:
  textDirection: ltr
apps:
  blog:
    isEnabled: true
    postsPerPage: 6
    post:
      isEnabled: true
      permalink: '/news/%slug%'
      robots:
        index: true
        follow: true
    list:
      isEnabled: true
      pathname: 'news'
      robots:
        index: true
        follow: true
    category:
      isEnabled: true
      pathname: 'category'
      robots:
        index: true
        follow: true
    tag:
      isEnabled: true
      pathname: 'tag'
      robots:
        index: false
        follow: true
    isRelatedPostsEnabled: true
    relatedPostsCount: 4
  products:
    isEnabled: true
    productsPerPage: 12
    product:
      isEnabled: true
      permalink: '/products/%slug%'
      robots:
        index: true
        follow: true
    list:
      isEnabled: true
      pathname: 'products'
      robots:
        index: true
        follow: true
analytics:
  vendors:
    googleAnalytics:
      id: null
ui:
  theme: 'system'

