features:
  id: features
  tagline: Почему Wavefella
  title: Что вы получаете с Wavefella
  subtitle: Десятилетия судостроительного опыта, объединённые в одной целенаправленной продуктовой линейке. Прочная постройка, морские испытания, пожизненная поддержка.
  columns: 2
  items:
    - title: Материалы морского класса
      description: Высокопрочный ПВХ, Hypalon и алюминиевые корпуса, отобранные за стойкость к УФ, истиранию и солёной воде.
      icon: tabler:shield-check
    - title: Качество заводского уровня
      description: Каждый корпус проходит проверку давлением, каждый шов контролируется. Отгружаем только то, что спустили бы сами.
      icon: tabler:certificate
    - title: Модульный дизайн
      description: Настройте расположение баллонов, положение консоли, ёмкость топлива и аксессуары под ваши задачи.
      icon: tabler:layout-grid
    - title: Честные спецификации
      description: Реальная грузоподъёмность, реальные размеры, реальный вес. Никаких маркетинговых преувеличений. Никогда.
      icon: tabler:ruler-measure
    - title: Быстрая доставка и запчасти
      description: Стандартные модели отправляются в течение дней. Оригинальные запчасти и расходники в наличии круглый год.
      icon: tabler:truck-delivery
    - title: Пожизненная поддержка
      description: Прямая линия с нашей командой разработчиков для технических консультаций, ремонта и советов по модернизации.
      icon: tabler:lifebuoy

