  linkText: Смотреть все товары
  linkUrl: /products

content_workshop:
  isReversed: true
  tagline: Внутри мастерской
  title: От разработки корпуса до доставки — каждый этап в собственном цехе
  content: |
    <h3 class="text-2xl font-bold tracking-tight dark:text-white sm:text-3xl mb-2">Качество, которое вы видите, чувствуете и можете измерить</h3>
  items:
    - title: Спроектировано корабельными инженерами
      description: Обводы корпуса рисуются внутри компании и итеративно дорабатываются через CFD-анализ перед первым прототипом.
    - title: Сварка и сборка на собственном заводе
      description: Сварка баллонов, монтаж консоли и оснастка производятся под одной крышей, что позволяет контролировать качество на каждом этапе.
    - title: Морские испытания перед отправкой
      description: Каждая модель проходит многочасовые морские испытания с проверкой глиссирования, поворотов, максимальной скорости и поведения под нагрузкой.
  image:
    src: https://images.unsplash.com/photo-1567899378494-47b22a2ae96a?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80
    alt: Мастерская

steps:
  title: От спецификации до спуска на воду за пять шагов
  items:
    - title: 'Шаг 1: <span class="font-medium">Настройка</span>'
      description: Выберите модель, определите опции и запросите цену онлайн или по телефону. Команда ответит в течение рабочего дня.
      icon: tabler:list-numbers
    - title: 'Шаг 2: <span class="font-medium">Подтверждение</span>'
      description: Мы письменно подтверждаем спецификации, сроки и полную стоимость. Никаких сюрпризов и скрытых платежей.
      icon: tabler:checks
    - title: 'Шаг 3: <span class="font-medium">Изготовление</span>'
      description: Производство начинается в нашей мастерской. Мы присылаем фото прогресса на ключевых этапах.
      icon: tabler:tool
    - title: 'Шаг 4: <span class="font-medium">Доставка</span>'
      description: Упаковывается на стойке, термоусаживается и отправляется морским или авиагрузом. Таможенное оформление полностью включено.
      icon: tabler:truck-loading
    - title: 'Шаг 5: <span class="font-medium">Поддержка</span>'
      description: Два года гарантии на корпус плюс пожизненная техническая поддержка. Запчасти отправляются в течение 48 часов.
      icon: tabler:headset
  image:
    src: https://images.unsplash.com/photo-1500627964684-141351970a7f?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80
    alt: Производственный процесс

blog_latest:
  title: Из блога
  information: |
    Статьи, технические заметки и примеры из практики от команды разработчиков.
    Новые посты появляются, когда проект сдан, стандарт обновлён или у кого-то есть история, достойная рассказа.

faqs:
  title: Часто задаваемые вопросы
  subtitle: Вопросы, которые мы слышим чаще всего. Если вашего здесь нет, напишите нам — мы быстро ответим.
  columns: 2
  items:
    - title: Какую модель выбрать?
      description: Зависит от размера экипажа, акватории и приоритетов — скорость, грузоподъёмность или экономия топлива. Пришлите краткое описание, и мы порекомендуем 2-3 подходящие модели.
      icon: tabler:anchor
    - title: Вы доставляете международно?
      description: Да — мы доставляем в 40+ стран. Морская перевозка — самый экономичный вариант для цельных лодок; авиадоставка доступна для срочных заказов.
      icon: tabler:ship
    - title: Какая у вас гарантия?
      description: Два года на корпус, один год на аксессуары, пожизненная на наши сварочные работы. Регистрация гарантии включена в каждую поставку.
      icon: tabler:shield
    - title: Можно ли кастомизировать существующую модель?
      description: Почти всегда. Положение консоли, цвет баллонов, расположение сидений, электроника и двигатель — всё настраивается. Специальные корпуса оцениваются индивидуально.
      icon: tabler:palette
    - title: Вы предоставляете обучение и сертификацию?
      description: Для коммерческих операторов мы можем организовать обучение на воде на нашем предприятии. Частные клиенты получают бесплатный инструктаж при получении.
      icon: tabler:school
    - title: Как получить запчасти?
      description: Закажите через страницу контактов или позвоните на горячую линию запчастей. Обычные детали (клапаны, ремни, насосы, ремкомплекты) отправляются по всему миру в течение 48 часов.
      icon: tabler:settings

