hero:
  tagline: О компании
  image:
    src: https://images.unsplash.com/photo-1500627964684-141351970a7f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1740&q=80
    alt: Мастерская Wavefella
  title: |
    Корабельная инженерия <br />
    в стиле <span class="text-accent dark:text-white">Wavefella</span>
  subtitle: 'Мы начали в прибрежной мастерской с одной лодкой и непоколебимой убеждённостью: морские продукты должны быть спроектированы так, как будто от них зависит жизнь — потому что так и есть. Сегодня мы поставляем в 40+ стран, но каждый корпус всё ещё проходит через те же руки, что основали компанию.'

stats:
  title: В цифрах
  columns: 4
  stats:
    - title: Поставлено корпусов
      amount: '2,400+'
    - title: Стран поставки
      amount: '40'
    - title: Совокупный опыт, лет
      amount: '60'
    - title: Среднее время ответа (ч)
      amount: '24'

features3_what_we_build:
  title: Что мы строим
  subtitle: Целенаправленная линейка продуктов, которую мы знаем вдоль и поперёк — никаких полуфабрикатов и бадж-инжиниринга.
  columns: 3
  isBeforeContent: true
  items:
    - title: RIB-лодки
      description: RIB с алюминиевым корпусом от 3,3 до 7,5 м. Предназначены для патрулирования, дайвинга, рыбалки и семейного использования.
      icon: tabler:ship
    - title: Надувные лодки
      description: Надувные лодки из ПВХ и Hypalon от 2,4 до 4,2 м. Лёгкие, прочные и простые в хранении.
      icon: tabler:speedboat
    - title: Тендеры для суперъяхт
      description: Компактные RIB с высокими характеристиками, изготовленные по дизайну материнского судна.
      icon: tabler:crown

features3_more:
  columns: 3
  isAfterContent: true
  items:
    - title: Аксессуары
      description: Ремни, насосы, чехлы, гермомешки, топливные баки и электроника. Все совместимы с нашими лодками.
      icon: tabler:package
    - title: Модернизация и ремонт
      description: Внутренний ремонт баллонов, модернизация электроники и замена двигателей.
      icon: tabler:tool
    - title: Изделия на заказ
      description: Проектные разработки для коммерческих, научных и военных заказчиков.
      icon: tabler:hammer
  image:
    src: https://images.unsplash.com/photo-1504384308090-c894fdcc538d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1740&q=80
    alt: Лодка на заказ

steps2_values:
  title: Наши ценности
  subtitle: Три принципа, которые формировали каждый продукт с первого дня.
  items:
    - title: Строй так, как будто в лодке твоя семья
      description: Каждый корпус, каждый шов и каждый компонент обрабатывается так, как если бы им пользовались наши собственные семьи.
      icon: tabler:heart
    - title: Инженерия прежде продаж
      description: Если спецификация неверна, мы меняем спецификацию — но никогда не клиента.
      icon: tabler:settings
    - title: Поддержка за пределами гарантии
      description: Двадцатилетние корпуса всё ещё звонят нам по поводу запчастей — и мы всё ещё отвечаем.
      icon: tabler:headset

steps2_milestones:
  title: Вехи
  subtitle: Краткая версия истории Wavefella.
  isReversed: true
  items:
    - title: Основана в прибрежной мастерской
      description: Два корабельных инженера с одним ЧПУ-станком и непоколебимой идеей.
      icon: tabler:building-factory
    - title: Первые 1 000 поставленных корпусов
      description: Достигнуто на седьмой год, в основном за счёт сарафанного радио и постоянных клиентов.
      icon: tabler:circle-check
    - title: Международная экспортная программа
      description: Поставки в 40+ стран с местными партнёрами по поддержке на пяти континентах.
      icon: tabler:world

features2_locations:
  title: Наши офисы
  tagline: Где нас найти
  columns: 3
  items:
    - title: Головной офис и мастерская
      description: Прибрежный индустриальный парк, корпус 4 — открыто пн-пт для посещений по записи.
    - title: Сервисный центр ЕС
      description: Средиземноморский порт — модернизация, ремонт и гарантийное обслуживание для европейских клиентов.
    - title: Партнёрская сеть АТР
      description: Авторизованные сервисные партнёры в Австралии, Японии, Сингапуре и Гонконге.
