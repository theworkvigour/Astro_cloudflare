hero_text:
  tagline: Контакты
  title: СВЯЖИТЕСЬ С НАМИ
contact_form:
  id: form
  title: Отправьте нам сообщение
  subtitle: По вопросам цен, техническим вопросам или партнёрству — напишите нам. Мы отвечаем в течение одного рабочего дня.
  email_to: info@wavefella.com
  submit_button: Отправить
  success_message: Спасибо! Ваше сообщение получено. Мы ответим в течение одного рабочего дня.
  error_message: Произошла ошибка при отправке. Попробуйте снова или напишите нам напрямую по электронной почте.
  default_country_code: '+1'
  captcha:
    label: 'Антиспам: решите следующую задачу'
  fields:
    - name: firstName
      label: Имя
      row: 1
    - name: lastName
      label: Фамилия
      row: 1
    - name: companyName
      label: Компания
      row: 2
    - name: address
      label: Адрес
      row: 3
    - name: zip
      label: Индекс
      row: 4
    - name: country
      label: Страна
      row: 4
      type: select
      optionsKey: countries
    - name: email
      label: Email
      row: 5
      type: email
    - name: tel
      label: Телефон
      row: 5
      type: tel
      withCountryCode: true
    - name: subject
      label: Тема
      row: 6
    - name: message
      label: Сообщение
      row: 7
      type: textarea
      rows: 6
features2_other_ways:
