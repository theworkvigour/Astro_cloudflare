      icon: tabler:tool
    - title: Пресса и партнёрства
      description: Медиа-киты, спонсорство и отраслевое сотрудничество.
      icon: tabler:news
    - title: Телефон
      description: '+1 (213) 557-7888'
      icon: tabler:headset
    - title: Email
      description: info@wavefella.com
      icon: tabler:mail
    - title: Головной офис
      description: 5067 Saddleback St, Montclair, CA 91763, USA
      icon: tabler:map-pin
map:
