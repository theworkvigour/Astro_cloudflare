hero:
  tagline: O firmie
  image:
    src: https://images.unsplash.com/photo-1500627964684-141351970a7f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1740&q=80
    alt: Warsztat Wavefella
  title: |
    Inżynieria okrętowa <br />
    w stylu <span class="text-accent dark:text-white">Wavefella</span>
  subtitle: 'Zaczęliśmy w nadmorskim warsztacie z jedną łodzią i niezachwianym przekonaniem: produkty morskie powinny być zaprojektowane tak, jakby od nich zależało życie – bo tak jest. Dziś dostarczamy do 40+ krajów, ale każdy kadłub wciąż przechodzi przez te same ręce, które założyły firmę.'

stats:
  title: W liczbach
  columns: 4
  stats:
    - title: Dostarczone kadłuby
      amount: '2,400+'
    - title: Kraje dostaw
      amount: '40'
    - title: Łączne doświadczenie (lata)
      amount: '60'
    - title: Średni czas odpowiedzi (h)
      amount: '24'

features3_what_we_build:
  title: Co budujemy
  subtitle: Skoncentrowana linia produktów, którą znamy od podszewki – żadnych półśrodków ani badge engineeringu.
  columns: 3
  isBeforeContent: true
  items:
    - title: Łodzie RIB
      description: RIB z kadłubem aluminiowym od 3,3 m do 7,5 m. Zaprojektowane do patrolowania, nurkowania, wędkowania i użytku rodzinnego.
      icon: tabler:ship
    - title: Łodzie pneumatyczne
      description: Łodzie pneumatyczne z PVC i Hypalon od 2,4 m do 4,2 m. Lekkie, wytrzymałe i łatwe w przechowywaniu.
      icon: tabler:speedboat
    - title: Tender do superjachtów
      description: Kompaktowe RIB o wysokich specyfikacjach, wykonane na miarę projektu jachtu macierzystego.
      icon: tabler:crown

features3_more:
  columns: 3
  isAfterContent: true
  items:
    - title: Akcesoria
      description: Pasy, pompy, pokrowce, torby wodoodporne, zbiorniki paliwa i elektronika. Wszystko kompatybilne z naszymi łodziami.
      icon: tabler:package
    - title: Modyfikacje i naprawy
      description: Naprawa przedziałów pneumatycznych, modernizacja elektroniki i wymiana silników.
      icon: tabler:tool
    - title: Produkty na zamówienie
      description: Projektowanie dla klientów komercyjnych, naukowych i wojskowych.
      icon: tabler:hammer
  image:
    src: https://images.unsplash.com/photo-1504384308090-c894fdcc538d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1740&q=80
    alt: Łódź na zamówienie

steps2_values:
  title: Nasze wartości
  subtitle: Trzy zasady kształtujące każdy produkt od pierwszego dnia.
  items:
    - title: Buduj tak, jakby w łodzi była twoja rodzina
      description: Każdy kadłub, każdy spaw i każdy komponent są traktowane tak, jakby miały być używane przez nasze własne rodziny.
      icon: tabler:heart
    - title: Inżynieria przed sprzedażą
      description: Jeśli specyfikacja jest błędna, zmieniamy specyfikację – nigdy klienta.
      icon: tabler:settings
    - title: Wsparcie poza gwarancją
      description: Dwudziestoletnie kadłuby wciąż dzwonią po części – i wciąż odbieramy.
      icon: tabler:headset

steps2_milestones:
  title: Kamienie milowe
  subtitle: Krótka wersja historii Wavefella.
  isReversed: true
  items:
    - title: Założona w nadmorskim warsztacie
      description: Dwóch inżynierów okrętowych z jedną frezarką CNC i niezachwianą ideą.
      icon: tabler:building-factory
    - title: Pierwsze 1 000 dostarczonych kadłubów
      description: Osiągnięte w siódmym roku, głównie dzięki poczcie pantoflowej i stałym klientom.
      icon: tabler:circle-check
    - title: Międzynarodowy program eksportowy
      description: Dostawy do 40+ krajów z lokalnymi partnerami serwisowymi na pięciu kontynentach.
      icon: tabler:world

features2_locations:
  title: Nasze lokalizacje
  tagline: Gdzie nas znaleźć
  columns: 3
  items:
    - title: Siedziba główna i warsztat
      description: Nadmorski park przemysłowy, budynek 4 – otwarte pn-pt dla odwiedzin po umówieniu.
    - title: Centrum serwisowe UE
      description: Port śródziemnomorski – modyfikacje, naprawy i wsparcie gwarancyjne dla klientów europejskich.
    - title: Sieć partnerska APAC
      description: Autoryzowani partnerzy serwisowi w Australii, Japonii, Singapurze i Hongkongu.
