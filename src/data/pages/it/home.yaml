  linkText: Vedi tutti i prodotti
  linkUrl: /products

content_workshop:
  isReversed: true
  tagline: Dentro l'officina
  title: Dalla progettazione alla consegna – ogni passo in casa
  content: |
    <h3 class="text-2xl font-bold tracking-tight dark:text-white sm:text-3xl mb-2">Qualità che vedi, senti e misuri</h3>
  items:
    - title: Progettato da architetti navali
      description: Le linee di scafo sono disegnate internamente e iterate attraverso analisi CFD prima del primo prototipo.
    - title: Saldato e assemblato nel nostro stabilimento
      description: Saldatura tubolari, montaggio console e allestimento avvengono sotto lo stesso tetto.
    - title: Testato in mare prima della spedizione
      description: Ogni modello completa un collaudo in mare di diverse ore, verificando planata, virata, velocità massima e comportamento a carico.
  image:
    src: https://images.unsplash.com/photo-1567899378494-47b22a2ae96a?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80
    alt: Officina

steps:
  title: Dalla scheda tecnica al varo in cinque passi
  items:
    - title: 'Passo 1: <span class="font-medium">Configura</span>'
      description: Scegli un modello, definisci le opzioni e richiedi un preventivo online o per telefono. Il team risponde entro un giorno lavorativo.
      icon: tabler:list-numbers
    - title: 'Passo 2: <span class="font-medium">Conferma</span>'
      description: Confermiamo specifiche, tempi di consegna e costo totale per iscritto. Nessuna sorpresa, nessuna tassa nascosta.
      icon: tabler:checks
    - title: 'Passo 3: <span class="font-medium">Costruisci</span>'
      description: La produzione inizia in officina. Inviiamo foto di avanzamento alle tappe principali.
      icon: tabler:tool
    - title: 'Passo 4: <span class="font-medium">Consegna</span>'
      description: Imballato su supporto, termoretto e spedito via mare o aria. Sdoganamento completamente incluso.
      icon: tabler:truck-loading
    - title: 'Passo 5: <span class="font-medium">Supporto</span>'
      description: Due anni di garanzia sullo scafo più assistenza tecnica a vita. Ricambi spediti entro 48 ore.
      icon: tabler:headset
  image:
    src: https://images.unsplash.com/photo-1500627964684-141351970a7f?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80
    alt: Processo produttivo

blog_latest:
  title: Dal blog
  information: |
    Articoli, note tecniche e case study dal team di progettazione.
    Nuovi post vengono pubblicati quando un progetto viene consegnato, uno standard viene aggiornato o qualcuno ha una storia che vale la pena condividere.

faqs:
  title: Domande frequenti
  subtitle: Le domande che sentiamo più spesso. Se la tua non è qui, scrivici – ti risponderemo rapidamente.
  columns: 2
  items:
    - title: Quale modello scegliere?
      description: Dipende dalle dimensioni dell'equipaggio, dal tipo di acque e se dai priorità a velocità, carico o efficienza carburante. Inviaci una breve descrizione e ti consiglieremo due o tre modelli adatti.
      icon: tabler:anchor
    - title: Consegnate a livello internazionale?
      description: Sì – consegniamo in oltre 40 paesi. Il trasporto marittimo è l'opzione più economica per barche complete; il trasporto aereo è disponibile per ordini urgenti.
      icon: tabler:ship
    - title: Quale garanzia offrite?
      description: Due anni sullo scafo, un anno sugli accessori, a vita sulle nostre saldature. La registrazione della garanzia è inclusa in ogni consegna.
      icon: tabler:shield
    - title: Posso personalizzare un modello esistente?
      description: Quasi sempre. Posizione console, colore tubolari, disposizione sedili, elettronica e motore possono essere personalizzati. Scafi speciali vengono quotati su progetto.
      icon: tabler:palette
    - title: Offrite formazione e certificazione?
      description: Per operatori commerciali possiamo organizzare formazione in mare presso il nostro stabilimento. Clienti privati ricevono istruzioni gratuite alla consegna.
      icon: tabler:school
    - title: Come ottenere ricambi?
      description: Ordina tramite la pagina contatti o chiama la nostra hotline ricambi. Parti comuni (valvole, cinghie, pompe, kit riparazione) spedite in 48 ore in tutto il mondo.
      icon: tabler:settings

