features:
  id: features
  tagline: Perché Wavefella
  title: Cosa ottieni con Wavefella
  subtitle: Decenni di esperienza cantieristica, condensati in una linea di prodotti mirata. Costruita solida, testata in mare, supportata a vita.
  columns: 2
  items:
    - title: Materiali di qualità nautica
      description: PVC, Hypalon e scafi in alluminio ad alta resistenza, selezionati per resistenza a UV, abrasione e acqua salata.
      icon: tabler:shield-check
    - title: Qualità da produzione
      description: Ogni scafo è testato a pressione, ogni saldatura controllata. Spediamo solo ciò che vareremmo noi stessi.
      icon: tabler:certificate
    - title: Design modulare
      description: Personalizza disposizione tubolari, posizione console, capacità carburante e accessori per le tue esigenze.
      icon: tabler:layout-grid
    - title: Specifiche oneste
      description: Carichi reali, misure reali, peso reale. Nessuna esagerazione di marketing. Mai.
      icon: tabler:ruler-measure
    - title: Consegna rapida e ricambi
      description: I modelli standard vengono spediti in giorni. Ricambi originali e materiali di consumo in magazzino tutto l'anno.
      icon: tabler:truck-delivery
    - title: Supporto a vita
      description: Linea diretta con il nostro team di progettazione per consulenze tecniche, riparazioni e改装.
      icon: tabler:lifebuoy

