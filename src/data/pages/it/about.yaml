hero:
  tagline: Chi siamo
  image:
    src: https://images.unsplash.com/photo-1500627964684-141351970a7f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1740&q=80
    alt: Officina Wavefella
  title: |
    Ingegneria navale, <br />
    alla <span class="text-accent dark:text-white">Wavefella</span>
  subtitle: "Siamo nati in un'officina costiera con una barca e una convinzione incrollabile: i prodotti nautici dovrebbero essere costruiti come se la vita dipendesse da loro – perché è così. Oggi spediamo in oltre 40 paesi, ma ogni scafo passa ancora attraverso le stesse mani che hanno fondato l'azienda."

