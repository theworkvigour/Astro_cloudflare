hero:
  tagline: Über uns
  image:
    src: https://images.unsplash.com/photo-1500627964684-141351970a7f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1740&q=80
    alt: Wavefella Werkstatt
  title: |
    Schiffstechnik, <br />
    auf die <span class="text-accent dark:text-white">Wavefella</span>-Art
  subtitle: 'Wir begannen in einer Küstenwerkstatt mit einem Boot und einer unbeirrbaren Überzeugung: Marineprodukte sollten so konstruiert sein, als ob es darauf ankommt – denn das tun sie. Heute liefern wir in über 40 Länder, aber jeder Rumpf durchläuft noch immer dieselben Hände, die das Unternehmen gegründet haben.'

