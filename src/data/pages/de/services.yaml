      text: Angebot anfordern
      href: /contact
  title: Benötigen Sie ein Angebot oder einen Kostenvoranschlag für den Umbau?
  subtitle: Senden Sie uns eine kurze Beschreibung und wir antworten mit einem Preis, einer Lieferzeit und unseren Empfehlungen.
