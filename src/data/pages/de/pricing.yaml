features3_included:
  title: Was Sie bei jedem Bau erhalten
  subtitle: Standards, keine Upgrades.
  columns: 2
  items:
    - title: Druckgeprüfter Rumpf
      description: Jeder Rumpf durchläuft einen 30-minütigen Drucktest, bevor er die Werkstatt verlässt.
      icon: tabler:gauge
    - title: Beschläge in Marinequalität
      description: 316 Edelstahlbefestigungen, Messingventile, UV-beständiges Schlauchgewebe.
      icon: tabler:shield
    - title: Motor angepasst und installiert
      description: Außenborder wird an den Rumpf angepasst und in unserer Anlage vorinstalliert.
      icon: tabler:engine
    - title: Seetestbericht
      description: Jedes Boot wird mit einem unterschriebenen Seetestbericht zu Leistungs- und Sicherheitsprüfungen ausgeliefert.
      icon: tabler:clipboard-check
    - title: Übergabepaket für den Eigentümer
      description: Bedienungsanleitung, Wartungsplan, Teilekatalog und Kontaktkarte.
      icon: tabler:book
    - title: Zwei Jahre Garantie
      description: Plus lebenslanger technischer Support von unserem Entwicklungsteam.
      icon: tabler:certificate

