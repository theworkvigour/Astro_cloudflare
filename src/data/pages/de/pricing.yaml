faqs:
  title: Preis-FAQ
  subtitle: Die Fragen, die wir am häufigsten zu Preisen und Zahlung erhalten.
  columns: 1
  items:
    - title: Gibt es versteckte Gebühren?
      description: Nein. Das Angebot, das wir senden, listet das Boot, Optionen, Motor, Fracht, Zoll und Steuern auf. Es gibt keine Extras bei der Lieferung.
    - title: Bieten Sie Finanzierung an?
      description: Wir finanzieren nicht direkt, arbeiten aber mit zwei bevorzugten Kreditgebern für gewerbliche Betreiber in der EU, Großbritannien und dem APAC-Raum zusammen.
    - title: Welche Zahlungsmethoden akzeptieren Sie?
      description: Banküberweisung für Anzahlungen und Restzahlungen. Kreditkarten für Anzahlungen bis zu 10.000 USD.
    - title: Kann ich mein altes Boot in Zahlung geben?
      description: Ja, von Fall zu Fall. Senden Sie uns Marke, Modell, Baujahr und aktuellen Zustand für einen unverbindlichen Inzahlungnahmewert.
    - title: Berechnen Sie Angebote?
      description: Standardkonfigurationsangebote sind kostenlos. Angebote für technische Sonderkonstruktionen können eine kleine Designgebühr enthalten, die bei Bestellung verrechnet wird.

cta:
  title: Bereit, Ihr Boot zu konfigurieren?
  subtitle: Nutzen Sie die Produktseiten, um ein Standardmodell zu konfigurieren, oder senden Sie uns eine Beschreibung für einen Sonderbau.
  actions:
    - variant: primary
      text: Produkte ansehen
      href: /products
    - text: Mit dem Vertrieb sprechen
      href: /contact
