  linkUrl: /products

content_workshop:
  isReversed: true
  tagline: Einblick in die Werkstatt
  title: Vom Rumpfentwurf bis zur Auslieferung – jeder Schritt bleibt im Haus
  content: |
    <h3 class="text-2xl font-bold tracking-tight dark:text-white sm:text-3xl mb-2">Qualität, die Sie sehen, fühlen und messen können</h3>
  items:
    - title: Entworfen von Schiffsarchitekten
      description: Rumpflinien werden intern gezeichnet und vor dem ersten Prototypen durch CFD-Analysen iteriert.
    - title: Geschweißt und montiert in unserer eigenen Anlage
      description: Schlauchschweißen, Konsolenausbau und Rigging finden unter einem Dach statt, sodass wir die Qualität in jedem Schritt kontrollieren.
    - title: Vor dem Versand auf See getestet
      description: Jedes Modell absolviert eine mehrstündige Seetestfahrt mit Prüfung von Gleiten, Wenden, Höchstgeschwindigkeit und Lastverhalten.
  image:
    src: https://images.unsplash.com/photo-1567899378494-47b22a2ae96a?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80
    alt: Werkstatt

steps:
  title: Vom Datenblatt zum Stapellauf in fünf Schritten
  items:
    - title: 'Schritt 1: <span class="font-medium">Konfigurieren</span>'
      description: Wählen Sie ein Modell, legen Sie Optionen fest und fordern Sie online oder telefonisch ein Angebot an. Unser Team antwortet innerhalb eines Werktags.
      icon: tabler:list-numbers
    - title: 'Schritt 2: <span class="font-medium">Bestätigen</span>'
      description: Wir bestätigen Spezifikationen, Lieferzeit und Gesamtkosten schriftlich. Keine Überraschungen, keine versteckten Gebühren.
      icon: tabler:checks
    - title: 'Schritt 3: <span class="font-medium">Bauen</span>'
      description: Die Produktion beginnt in unserer Werkstatt. Wir senden Fortschrittsfotos bei wichtigen Meilensteinen.
      icon: tabler:tool
    - title: 'Schritt 4: <span class="font-medium">Liefern</span>'
      description: Verstaut in einer Halterung, schrumpfverpackt und per See- oder Luftfracht versandt. Zollabwicklung komplett inklusive.
      icon: tabler:truck-loading
    - title: 'Schritt 5: <span class="font-medium">Support</span>'
      description: Zwei Jahre Rumpfgarantie plus lebenslanger technischer Support. Ersatzteile werden innerhalb von 48 Stunden versandt.
      icon: tabler:headset
  image:
    src: https://images.unsplash.com/photo-1500627964684-141351970a7f?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80
    alt: Fertigungsprozess

blog_latest:
  title: Aus dem Journal
  information: |
    Artikel, technische Hinweise und Fallstudien aus dem Entwicklungsteam.
    Neue Beiträge erscheinen, sobald ein Projekt ausgeliefert, ein Standard aktualisiert wurde oder jemand eine Geschichte erzählen möchte, die es wert ist, geteilt zu werden.

faqs:
  title: Häufig gestellte Fragen
  subtitle: Die Fragen, die wir am häufigsten hören. Falls Ihre nicht dabei ist, schreiben Sie uns – wir melden uns schnell zurück.
  columns: 2
  items:
    - title: Welches Modell soll ich wählen?
      description: Das hängt von Ihrer Crewgröße, dem Gewässer und davon ab, ob Sie Geschwindigkeit, Nutzlast oder Kraftstoffeffizienz priorisieren. Senden Sie uns eine kurze Beschreibung und wir empfehlen zwei oder drei passende Modelle.
      icon: tabler:anchor
    - title: Liefern Sie international?
      description: Ja – wir liefern in über 40 Länder. Seefracht ist die wirtschaftlichste Option für komplette Boote; Luftfracht steht für Eilbestellungen zur Verfügung.
      icon: tabler:ship
    - title: Welche Garantie bieten Sie?
      description: Zwei Jahre auf den Rumpf, ein Jahr auf Zubehör, lebenslang auf unsere Schweißarbeiten. Die Garantieregistrierung ist bei jeder Lieferung inklusive.
      icon: tabler:shield
    - title: Kann ich ein bestehendes Modell anpassen?
      description: Fast immer. Konsolenposition, Schlauchfarbe, Sitzanordnung, Elektronik und Motorpaket können alle angepasst werden. Sonderrümpfe werden projektbezogen kalkuliert.
      icon: tabler:palette
    - title: Bieten Sie Schulungen und Zertifizierungen an?
      description: Für gewerbliche Betreiber können wir eine Seetest-Schulung in unserer Anlage arrangieren. Freizeitkunden erhalten eine kostenlose Einweisung bei der Übergabe.
      icon: tabler:school
    - title: Wie bekomme ich Ersatzteile?
      description: Bestellen Sie über die Kontaktseite oder rufen Sie unsere Ersatzteil-Hotline an. Gängige Teile (Ventile, Riemen, Pumpen, Reparatursets) werden innerhalb von 48 Stunden weltweit versandt.
      icon: tabler:settings

