features:
  id: features
  tagline: Warum Wavefella
  title: Was Sie mit Wavefella bekommen
  subtitle: Jahrzehnte der Schiffsbau-Erfahrung, gebündelt in einer fokussierten Produktlinie. Robust gebaut, auf See getestet, lebenslang unterstützt.
  columns: 2
  items:
    - title: Materialien in Marinequalität
      description: Hochbelastbares PVC, Hypalon und Aluminiumrümpfe, ausgewählt für UV-, Abrieb- und Salzwasserbeständigkeit.
      icon: tabler:shield-check
    - title: Produktionsreife Qualität
      description: Jeder Rumpf wird druckgeprüft, jede Schweißnaht kontrolliert. Wir versenden nur, was wir selbst zu Wasser lassen würden.
      icon: tabler:certificate
    - title: Modular im Design
      description: Passen Sie Schlauchanordnung, Konsolenposition, Kraftstoffkapazität und Zubehör an Ihren Einsatz an.
      icon: tabler:layout-grid
    - title: Ehrliche Spezifikationen
      description: Echte Lastangaben, echte Maße, echtes Gewicht. Keine Marketing-Übertreibungen. Nie.
      icon: tabler:ruler-measure
    - title: Schnelle Lieferung & Ersatzteile
      description: Standardmodelle werden in Tagen versandt. Original Ersatzteile und Verbrauchsmaterialien ganzjährig auf Lager.
      icon: tabler:truck-delivery
    - title: Lebenslanger Support
      description: Direkte Leitung zu unserem Entwicklungsteam für technische Fragen, Reparaturen und Umbauberatung.
      icon: tabler:lifebuoy

