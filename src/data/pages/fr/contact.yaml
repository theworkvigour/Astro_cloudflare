hero_text:
  tagline: Contact
  title: PRENEZ CONTACT
contact_form:
  id: form
  title: Envoyez-nous un message
  subtitle: Pour des devis, des questions techniques ou des demandes de partenariat, écrivez-nous. Nous répondons sous un jour ouvré.
  email_to: hello@wavefella.com
  submit_button: Envoyer le message
  success_message: Merci ! Votre message a bien été reçu. Nous répondrons sous un jour ouvré.
  error_message: Une erreur s'est produite lors de l'envoi. Veuillez réessayer ou nous envoyer un e-mail directement.
  default_country_code: '+1'
  captcha:
    label: 'Anti-spam : veuillez résoudre le calcul suivant'
  fields:
    - name: firstName
      label: Prénom
      row: 1
    - name: lastName
      label: Nom
      row: 1
    - name: companyName
      label: Entreprise
      row: 2
    - name: address
      label: Adresse
      row: 3
    - name: zip
      label: Code postal
      row: 4
    - name: country
      label: Pays
      row: 4
      type: select
      optionsKey: countries
    - name: email
      label: E-mail
      row: 5
      type: email
    - name: tel
      label: TÉL
      row: 5
      type: tel
      withCountryCode: true
    - name: subject
      label: Sujet
      row: 6
    - name: message
      label: Message
      row: 7
      type: textarea
      rows: 6
