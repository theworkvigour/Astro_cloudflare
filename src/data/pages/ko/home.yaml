hero:
  tagline: ''
  title: |
    물을 위해 디자인되었습니다.<br class="hidden sm:inline" />
    <span class="text-accent dark:text-white">선상 생활</span>을 위해 제작되었습니다.
  subtitle: |
    <span class="hidden sm:inline"><span class="font-semibold">Wavefella</span>는 고품질 인플레이터블 보트, RIB 및 기술 제품을 설계 및 제조합니다.</span>
    <span class="block mb-1 sm:hidden font-bold text-blue-600">Wavefella: 성능을 위해 제작되었습니다.</span>
    신뢰성과 장인 정신을 요구하는 해양 전문가, 상업 운영자 및 애호가에게 적합합니다.
  actions:
    - variant: primary
      text: 제품 보기
      href: /products
      icon: tabler:shopping-bag
    - text: 자세히 보기
      href: '#features'
  image:
    src: ~/assets/images/hero-image.png
    alt: Wavefella 커버 이미지

