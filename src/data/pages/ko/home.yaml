      actions:
        - text: 문의하기
          href: /contact
          variant: primary
        - text: 가격 보기
          href: /pricing
          variant: secondary

features:
  id: features
  tagline: Wavefella를 선택해야 하는 이유
  title: Wavefella로 얻을 수 있는 것
  subtitle: 수십 년의 조선 경험을 하나의 집중된 제품 라인에 담았습니다. 견고하게 제작되고, 해상 테스트를 거쳤으며, 평생 지원합니다.
  columns: 2
  items:
    - title: 해양용 소재
      description: 자외선, 마모, 염수에 강한 고강도 PVC, Hypalon 및 알루미늄 선체.
      icon: tabler:shield-check
    - title: 생산 품질
      description: 모든 선체는 압력 테스트를 거치고, 모든 용접부는 검사됩니다. 우리가 직접 진수할 수 있는 것만 출고합니다.
      icon: tabler:certificate
    - title: 모듈식 디자인
      description: 튜브 배열, 콘솔 위치, 연료 용량 및 액세서리를 사용 용도에 맞게 조정 가능.
      icon: tabler:layout-grid
    - title: 정직한 사양
      description: 실제 하중, 실제 치수, 실제 중량. 마케팅 과장은 절대 없습니다.
      icon: tabler:ruler-measure
    - title: 신속한 납품 및 부품 공급
      description: 표준 모델은 수일 내에 발송됩니다. 순정 부품과 소모품은 연중 재고 보유.
      icon: tabler:truck-delivery
    - title: 평생 지원
      description: 기술 상담, 수리 및 개조 조언을 위한 설계팀 직통 회선.
      icon: tabler:lifebuoy

featured_products:
  id: featured
  title: 추천 제품
  subtitle: 현재 카탈로그에서 선별한 이번 시즌 가장 인기 있는 모델.
  linkText: 모든 제품 보기
  linkUrl: /products

content_workshop:
  isReversed: true
  tagline: 작업장 탐방
  title: 선체 설계부터 납품까지—모든 공정을 자체적으로
  content: |
    <h3 class="text-2xl font-bold tracking-tight dark:text-white sm:text-3xl mb-2">보고, 느끼고, 측정할 수 있는 품질</h3>
  items:
    - title: 선박 설계자에 의한 설계
      description: 선체 라인은 내부에서 그리고 첫 번째 프로토타입 전에 CFD 해석을 통해 반복 개선됩니다.
    - title: 자체 공장에서 용접 및 조립
      description: 튜브 용접, 콘솔 장착 및 의장이 동일한 건물에서 이루어져 모든 단계에서 품질을 관리합니다.
    - title: 출하 전 해상 테스트
      description: 각 모델은 활주, 선회, 최고 속도 및 적재 거동을 확인하는 수시간의 해상 시운전을 완료합니다.
  image:
    src: https://images.unsplash.com/photo-1567899378494-47b22a2ae96a?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80
    alt: 작업장

steps:
  title: 사양서에서 진수까지 5단계
  items:
    - title: '1단계: <span class="font-medium">설정</span>'
      description: 모델을 선택하고 옵션을 결정한 후 온라인 또는 전화로 견적을 요청하세요. 팀이 1영업일 이내에 답변합니다.
      icon: tabler:list-numbers
    - title: '2단계: <span class="font-medium">확인</span>'
      description: 사양, 납기, 총 비용을 서면으로 확인합니다. 숨겨진 비용은 없습니다.
      icon: tabler:checks
    - title: '3단계: <span class="font-medium">제조</span>'
      description: 작업장에서 생산이 시작됩니다. 주요 이정표에서 진행 사진을 보내드립니다.
      icon: tabler:tool
    - title: '4단계: <span class="font-medium">납품</span>'
      description: 크래들에 포장, 수축 포장 후 해상 또는 항공 화물로 발송됩니다. 통관 절차는 모두 포함됩니다.
      icon: tabler:truck-loading
    - title: '5단계: <span class="font-medium">지원</span>'
      description: 2년 선체 보증 및 평생 기술 지원. 부품은 48시간 이내에 발송됩니다.
      icon: tabler:headset
  image:
    src: https://images.unsplash.com/photo-1500627964684-141351970a7f?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80
    alt: 제조 공정

blog_latest:
  title: 블로그에서
  information: |
    설계팀의 기사, 기술 노트 및 사례 연구.
    프로젝트가 납품되거나, 표준이 업데이트되거나, 공유할 가치가 있는 이야기가 있을 때 새 게시물이 게시됩니다.

faqs:
  title: 자주 묻는 질문
  subtitle: 가장 자주 듣는 질문들입니다. 귀하의 질문이 여기에 없다면 메시지를 보내주세요—빠르게 답변드리겠습니다.
  columns: 2
  items:
    - title: 어떤 모델을 선택해야 하나요?
      description: 승무원 수, 수역 환경, 속도/적재량/연비 중 우선순위에 따라 다릅니다. 간단한 설명을 보내주시면 적합한 모델 2~3개를 추천해 드립니다.
      icon: tabler:anchor
    - title: 국제 배송이 가능한가요?
      description: 네—40개국 이상으로 배송합니다. 완성 보트는 해상 운송이 가장 경제적이며, 긴급 주문은 항공 화물 이용 가능합니다.
      icon: tabler:ship
    - title: 보증 내용은 무엇인가요?
      description: 선체 2년, 액세서리 1년, 용접부 평생 보증. 보증 등록은 모든 납품 시 포함됩니다.
      icon: tabler:shield
    - title: 기존 모델을 맞춤 제작할 수 있나요?
      description: 대부분 가능합니다. 콘솔 위치, 튜브 색상, 시트 배열, 전자 장비 및 엔진 패키지를 조정할 수 있습니다. 특수 선체는 프로젝트 기준으로 견적됩니다.
      icon: tabler:palette
    - title: 교육 및 인증을 제공하나요?
      description: 상업 운영자를 위해 저희 공장에서 해상 시운전 교육을 주선할 수 있습니다. 레저 고객은 인도 시 무료 설명을 받으실 수 있습니다.
      icon: tabler:school
    - title: 부품은 어떻게 구매하나요?
      description: 문의하기 페이지를 통해 주문하거나 부품 핫라인으로 전화하세요. 일반 부품(밸브, 스트랩, 펌프, 수리 키트)은 48시간 이내에 전 세계로 발송됩니다.
      icon: tabler:settings

cta:
  title: |
    다음 보트를<br class="block sm:hidden" /><span class="sm:whitespace-nowrap">설정할 준비가 되셨나요</span>?
  subtitle: 보트 사용 방법을 알려주시면 1영업일 이내에 모델, 옵션 및 가격을 제안해 드립니다.
  actions:
    - variant: primary
      text: 견적 요청
      href: /contact
      icon: tabler:message-circle
    - text: 카탈로그 보기
      href: /products
