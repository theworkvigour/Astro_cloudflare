hero_text:
  tagline: 联系方式
  title: 联系我们
contact_form:
  id: form
  title: 发送消息
  subtitle: 如需报价、技术咨询或合作垂询，请给我们留言。我们会在一个工作日内回复。
  email_to: info@wavefella.com
  submit_button: 发送消息
  success_message: 谢谢！您的消息已收到。我们会在一个工作日内回复。
  error_message: 发送消息时出错。请重试或直接给我们发送邮件。
  default_country_code: '+1'
  captcha:
    label: '反垃圾：请解答以下问题'
  fields:
    - name: firstName
      label: 名字
      row: 1
    - name: lastName
      label: 姓氏
      row: 1
    - name: companyName
      label: 公司
      row: 2
    - name: address
      label: 地址
      row: 3
    - name: zip
      label: 邮政编码
      row: 4
    - name: country
      label: 国家
      row: 4
      type: select
      optionsKey: countries
    - name: email
      label: 邮箱
      row: 5
      type: email
    - name: tel
      label: 电话
      row: 5
      type: tel
      withCountryCode: true
    - name: subject
      label: 主题
      row: 6
    - name: message
      label: 留言
      row: 7
      type: textarea
      rows: 6
