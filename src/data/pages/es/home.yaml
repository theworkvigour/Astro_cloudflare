features:
  id: features
  tagline: Por qué Wavefella
  title: Lo que obtienes con Wavefella
  subtitle: Décadas de experiencia en ingeniería marina, destiladas en una línea de productos enfocada. Construido resistente, probado en el mar, respaldado de por vida.
  columns: 2
  items:
    - title: Materiales de calidad marina
      description: PVC de alta resistencia, Hypalon y cascos de aluminio seleccionados por su resistencia a los rayos UV, la abrasión y el agua salada.
      icon: tabler:shield-check
    - title: Calidad lista para producción
      description: Cada casco se prueba a presión, cada soldadura se inspecciona. Enviamos solo lo que nosotros mismos pondríamos en el agua.
      icon: tabler:certificate
    - title: Diseño modular
      description: Personalice la disposición de los tubos, la posición de la consola, la capacidad de combustible y los accesorios según su misión.
      icon: tabler:layout-grid
    - title: Especificaciones honestas
      description: Cargas reales, dimensiones reales, peso real. Sin inflación de marketing, nunca.
      icon: tabler:ruler-measure
    - title: Entrega rápida y repuestos
      description: Los modelos comunes se envían en días. Repuestos originales y consumibles en stock todo el año.
      icon: tabler:truck-delivery
    - title: Soporte de por vida
      description: Línea directa con nuestro equipo de ingeniería para preguntas técnicas, reparaciones y asesoramiento de renovación.
      icon: tabler:lifebuoy

featured_products:
  id: featured
  title: Productos destacados
  subtitle: Seleccionados de nuestro catálogo actual — los modelos más populares de esta temporada.
  linkText: Ver todos los productos
  linkUrl: /products

content_workshop:
  isReversed: true
  tagline: Dentro del taller
  title: Desde el diseño del casco hasta la entrega, cada paso permanece en casa
  content: |
    <h3 class="text-2xl font-bold tracking-tight dark:text-white sm:text-3xl mb-2">Calidad que puede ver, sentir y medir</h3>
  items:
    - title: Diseñado por arquitectos navales
      description: Las líneas del casco se dibujan internamente y se iteran mediante análisis CFD antes de que el primer prototipo toque el agua.
    - title: Soldado y ensamblado en nuestras instalaciones
      description: La soldadura de tubos, el montaje de la consola y el aparejo se realizan bajo un mismo techo para controlar la calidad en cada paso.
    - title: Probado en el mar antes del envío
      description: Cada modelo completa una prueba de mar de varias horas que abarca planeo, giros, velocidad máxima y manejo de carga.
  image:
    src: https://images.unsplash.com/photo-1567899378494-47b22a2ae96a?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80
    alt: Taller

steps:
  title: De la ficha técnica al agua en cinco pasos
  items:
    - title: 'Paso 1: <span class="font-medium">Configurar</span>'
      description: Elija un modelo, seleccione sus opciones, solicite un presupuesto en línea o por teléfono. Nuestro equipo responde dentro de un día hábil.
      icon: tabler:list-numbers
    - title: 'Paso 2: <span class="font-medium">Confirmar</span>'
      description: Confirmamos las especificaciones, el plazo de entrega y el costo total por escrito. Sin sorpresas, sin cargos ocultos.
      icon: tabler:checks
    - title: 'Paso 3: <span class="font-medium">Construir</span>'
      description: La producción comienza en nuestro taller. Enviamos fotos de progreso en los hitos principales.
      icon: tabler:tool
    - title: 'Paso 4: <span class="font-medium">Entregar</span>'
      description: Embalado en cuna, envuelto en plástico retráctil y enviado por mar o aire. Trámites aduaneros gestionados de principio a fin.
      icon: tabler:truck-loading
    - title: 'Paso 5: <span class="font-medium">Soporte</span>'
      description: Garantía de casco de dos años más soporte técnico de por vida. Repuestos enviados en 48 horas.
      icon: tabler:headset
  image:
    src: https://images.unsplash.com/photo-1500627964684-141351970a7f?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80
    alt: Proceso de fabricación

blog_latest:
  title: Del blog
  information: |
    Artículos, notas técnicas y estudios de caso del equipo de ingeniería.
    Se agregan nuevas entradas cada vez que se envía un proyecto, se actualiza una norma o alguien tiene una historia que vale la pena contar.

faqs:
  title: Preguntas frecuentes
  subtitle: Las preguntas que más escuchamos. Si la suya no está aquí, escríbanos y le responderemos rápidamente.
  columns: 2
  items:
    - title: ¿Qué modelo elegir?
      description: Depende del tamaño de su tripulación, las aguas en las que navegue y si prioriza velocidad, carga útil o economía de combustible. Envíenos una breve descripción y le recomendaremos dos o tres modelos adecuados.
      icon: tabler:anchor
    - title: ¿Envían internacionalmente?
      description: Sí — entregamos en más de 40 países. El transporte marítimo es la opción más económica para botes completos; el transporte aéreo está disponible para pedidos urgentes.
      icon: tabler:ship
    - title: ¿Qué garantía ofrecen?
      description: Dos años en el casco, un año en accesorios, de por vida en nuestras soldaduras. El registro de garantía se incluye con cada entrega.
      icon: tabler:shield
    - title: ¿Puedo personalizar un modelo existente?
      description: Casi siempre. La posición de la consola, el color de los tubos, la disposición de los asientos, la electrónica y el paquete de motor se pueden adaptar. Los cascos personalizados se cotizan proyecto por proyecto.
      icon: tabler:palette
    - title: ¿Ofrecen formación y certificación?
      description: Para operadores comerciales, podemos organizar una formación en prueba de mar en nuestras instalaciones. Los clientes recreativos reciben una sesión de entrega gratuita.
      icon: tabler:school
    - title: ¿Cómo obtengo repuestos?
      description: Solicítelos a través de la página de contacto o llame a nuestra línea de repuestos. Los artículos comunes (válvulas, remos, bombas, kits de reparación) se envían en 48 horas a todo el mundo.
      icon: tabler:settings

