hero_text:
  tagline: Contacto
  title: PONTE EN CONTACTO
contact_form:
  id: form
  title: Envíanos un mensaje
  subtitle: Para presupuestos, preguntas técnicas o consultas de asociación, escríbenos. Respondemos en un día hábil.
  email_to: hello@wavefella.com
  submit_button: Enviar mensaje
  success_message: ¡Gracias! Tu mensaje ha llegado a nuestra bandeja de entrada. Responderemos en un día hábil.
  error_message: Algo salió mal al enviar tu mensaje. Inténtalo de nuevo o escríbenos directamente.
  default_country_code: '+1'
  captcha:
    label: 'Anti-spam: resuelve el siguiente cálculo'
  fields:
    - name: firstName
      label: Nombre
      row: 1
    - name: lastName
      label: Apellidos
      row: 1
    - name: companyName
      label: Empresa
      row: 2
    - name: address
      label: Dirección
      row: 3
    - name: zip
      label: Código postal
      row: 4
    - name: country
      label: País
      row: 4
      type: select
      optionsKey: countries
    - name: email
      label: Correo electrónico
      row: 5
      type: email
    - name: tel
      label: TEL
      row: 5
      type: tel
      withCountryCode: true
    - name: subject
      label: Asunto
      row: 6
    - name: message
      label: Mensaje
      row: 7
      type: textarea
      rows: 6
features2_other_ways:
  title: Otras formas de contactarnos
  columns: 3
  items:
    - title: Ventas
      description: Presupuestos, configuraciones, solicitudes de distribuidor y pedidos al por mayor.
      icon: tabler:shopping-bag
    - title: Soporte técnico
      description: Garantía, reparaciones, repuestos y preguntas de funcionamiento.
      icon: tabler:tool
    - title: Prensa y asociaciones
      description: Kits de prensa, patrocinio y colaboración industrial.
      icon: tabler:news
    - title: Teléfono
      description: '+8613305324192'
      icon: tabler:headset
    - title: Correo electrónico
      description: hello@wavefella.com
      icon: tabler:mail
    - title: Sede central
      description: Parque industrial costero, edificio 4, huso horario UE
      icon: tabler:map-pin
map:
  title: Nuestra ubicación
  subtitle: Visítanos en nuestra sede central
  address: Parque industrial costero, edificio 4, huso horario UE
  zoom: 15
