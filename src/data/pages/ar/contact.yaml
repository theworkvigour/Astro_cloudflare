      icon: tabler:shopping-bag
    - title: الدعم الفني
      description: الضمان، الإصلاحات، قطع الغيار وأسئلة التشغيل.
      icon: tabler:tool
    - title: الإعلام والشراكات
      description: الحزم الإعلامية، الرعاية والتعاون الصناعي.
      icon: tabler:news
    - title: الهاتف
      description: '+1 (213) 557-7888'
      icon: tabler:headset
    - title: البريد الإلكتروني
      description: info@wavefella.com
      icon: tabler:mail
    - title: المقر الرئيسي
      description: 5067 Saddleback St, Montclair, CA 91763, USA
      icon: tabler:map-pin
