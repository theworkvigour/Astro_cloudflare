hero:
  tagline: عنّا
  image:
    src: https://images.unsplash.com/photo-1500627964684-141351970a7f?ixlib=rb-4.0.3&auto=format&fit=crop&w=1740&q=80
    alt: ورشة Wavefella
  title: |
    هندسة بحرية، <br />
    تُبنى بطريقة <span class="text-accent dark:text-white">Wavefella</span>
  subtitle: 'بدأنا في ورشة ساحلية بقارب واحد وإيمان راسخ: المنتجات البحرية يجب أن تُهندَس وكأنها مهمة، لأنها بالفعل كذلك. واليوم نُصدّر إلى أكثر من 40 دولة، لكن كل هيكل لا يزال يمر عبر الأيدي نفسها التي أسست الشركة.'

stats:
