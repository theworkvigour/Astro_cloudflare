features3_included:
  title: ما تحصل عليه في كل بناء
  subtitle: معايير، ليست ترقيات.
  columns: 2
  items:
    - title: هيكل مُختبر الضغط
      description: كل هيكل يجتاز اختبار ضغط لمدة 30 دقيقة قبل مغادرة الورشة.
      icon: tabler:gauge
    - title: تجهيزات بحرية
      description: مثبتات من الفولاذ المقاوم للصدأ 316، صمامات نحاسية، قماش أنابيب مقاوم للأشعة فوق البنفسجية.
      icon: tabler:shield
    - title: محرك موائم ومجهز
      description: المحرك الخارجي مطابق للهيكل ومجهز مسبقاً في منشأتنا.
      icon: tabler:engine
    - title: تقرير التجربة البحرية
      description: كل قارب يأتي مع تقرير تجربة بحرية موقع يغطي فحوصات الأداء والسلامة.
      icon: tabler:clipboard-check
    - title: حقيبة تسليم المالك
      description: دليل المالك، جدول الصيانة، كتالوج القطع وبطاقة الاتصال.
      icon: tabler:book
    - title: ضمان لمدة سنتين
      description: بالإضافة إلى دعم فني مدى الحياة من فريقنا الهندسي.
      icon: tabler:certificate

