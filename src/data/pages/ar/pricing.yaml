faqs:
  title: الأسئلة الشائعة حول الأسعار
  subtitle: الأسئلة التي نتلقاها غالباً حول الأسعار والدفع.
  columns: 1
  items:
    - title: هل هناك رسوم خفية؟
      description: لا. عرض السعر الذي نرسله يفصل القارب والخيارات والمحرك والشحن والجمارك والضرائب. لا توجد رسوم إضافية عند التسليم.
    - title: هل تقدمون تمويلاً؟
      description: لا نمول مباشرة، لكننا نعمل مع جهتي إقراض مفضلتين للمشغلين التجاريين في الاتحاد الأوروبي والمملكة المتحدة ومنطقة آسيا والمحيط الهادئ.
    - title: ما طرق الدفع التي تقبلونها؟
      description: التحويل المصرفي للدفعات الأولى والأرصدة. بطاقات الائتمان للدفعات الأولى حتى 10,000 دولار أمريكي.
    - title: هل يمكنني استبدال قاربي القديم؟
      description: نعم، على أساس كل حالة على حدة. أرسل لنا الماركة والموديل والسنة والحالة الحالية للحصول على قيمة استبدالية تقريبية.
    - title: هل تتقاضون رسوماً مقابل عروض الأسعار؟
      description: عروض الأسعار للتهيئة القياسية مجانية. عروض الأسعار الهندسية المخصصة للمباني غير القياسية قد تحمل رسماً بسيطاً للتصميم، قابل للاسترداد عند الطلب.

cta:
