name = "wavefella"
compatibility_date = "2026-06-05"
compatibility_flags = ["nodejs_compat"]
main = "@astrojs/cloudflare/entrypoints/server"

[assets]
directory = "./dist/client"
binding = "ASSETS"

# --- AI Infrastructure ---
# Workers AI + Vectorize + AI_QUOTA KV bindings
#
# Workers AI Free tier: 10,000 neurons/day (across ALL models).
# The app-level quota enforcer (ai-quota.ts) caps at 9,000 neurons/day
# to leave a buffer.
#
# To enable persistent AI quota tracking across worker instances:
#   npx wrangler kv:namespace create AI_QUOTA
# Then add the following to this file:
#   [[kv_namespaces]]
#   binding = "AI_QUOTA"
#   id = "<generated-id>"
#   preview_id = "<generated-preview-id>"
# Without KV, the quota resets per-worker-isolate (in-memory only).
#
# Vectorize index must exist with --dimensions=768 --metric=cosine:
#   npx wrangler vectorize create ai-index --dimensions=768 --metric=cosine

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "ai-index"

# --- Environment Variables ---

[vars]
NODE_VERSION = "22"
NODE_ENV = "development"
# SESSION_SECRET - required, set via: wrangler secret put SESSION_SECRET
# KEYSTATIC_SECRET - optional, set via: wrangler secret put KEYSTATIC_SECRET
