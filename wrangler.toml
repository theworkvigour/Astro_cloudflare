name = "wavefella"
compatibility_date = "2026-06-05"
compatibility_flags = ["nodejs_compat"]
main = "@astrojs/cloudflare/entrypoints/server"

[assets]
directory = "./dist/client"
binding = "ASSETS"

# ----------------------------------------------------------------
# v3.6 — SEO Factory Production Deployment
# ----------------------------------------------------------------
# Two deployment modes:
#
# 1. Astro Site (this config):
#    npx wrangler deploy
#
# 2. Standalone SEO Factory Worker (seo-worker):
#    npx wrangler deploy workers/cron.js --name seo-worker
#    npx wrangler deploy workers/cron.js --name seo-worker --triggers cron
#    npx wrangler kv:namespace create SEO_KV
#    npx wrangler secret put GSC_TOKEN
#    npx wrangler secret put GSC_SITE_URL
#
# The standalone Worker runs daily at 9:00 UTC via GitHub Actions:
#   .github/workflows/seo-factory.yml
#
# Run pipeline locally:
#    npm run seo:pipeline
#    # output/ contains tasks.json, tasks.md, tasks.csv, geo.json
# ----------------------------------------------------------------
#
# 3. Subdomain Router (subdomain-router):
#    npx wrangler deploy workers/subdomain-router.js --name alluredna-subdomain-router
#    Then configure Cloudflare DNS:
#      *.alluredna.com  CNAME  your-pages-project.pages.dev  (Proxied/橙色云)
#    And add a route in Cloudflare Dashboard:
#      *.alluredna.com/*  →  alluredna-subdomain-router
#    (The root alluredna.com goes directly to Pages, no worker.)
# ----------------------------------------------------------------

# --- AI Infrastructure ---
# Workers AI + Vectorize bindings
#   npx wrangler vectorize create ai-index --dimensions=768 --metric=cosine

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "ai-index"

# --- Environment Variables ---

[vars]
NODE_VERSION = "22"
NODE_ENV = "development"
# SESSION_SECRET - required, set via: wrangler secret put SESSION_SECRET
# KEYSTATIC_SECRET - optional, set via: wrangler secret put KEYSTATIC_SECRET
