name = "wavefella"
compatibility_date = "2026-06-05"
compatibility_flags = ["nodejs_compat"]
main = "@astrojs/cloudflare/entrypoints/server"

[assets]
directory = "./dist/client"
binding = "ASSETS"

# ----------------------------------------------------------------
# Single Worker Deployment — Astro Site
# ----------------------------------------------------------------
# Subdomain routing ({locale}.alluredna.com → alluredna.com/{lang}/)
# is injected into the built Worker by scripts/patch-worker.mjs
# during the build step.
#
# Manual deploy:
#   npx wrangler deploy
#
# Required Cloudflare setup (one time only):
#   ┌──────────────────────────────────────────────────────────────┐
#   │ 1. DNS:  *  CNAME  alluredna.com  (橙色云/Proxied)         │
#   │ 2. Route: *.alluredna.com/* → wavefella Worker              │
#   │    (Cloudflare Dashboard → Workers & Pages → wavefella      │
#   │     → Triggers → Routes → Add Route)                       │
#   └──────────────────────────────────────────────────────────────┘
# ----------------------------------------------------------------

# --- AI Infrastructure ---
# Workers AI + Vectorize bindings
#   npx wrangler vectorize create ai-index --dimensions=768 --metric=cosine

[ai]
binding = "AI"

[[vectorize]]
binding = "VECTORIZE"
index_name = "ai-index"

# --- Environment Variables ---

[vars]
NODE_VERSION = "22"
NODE_ENV = "development"
# SESSION_SECRET - required, set via: wrangler secret put SESSION_SECRET
# KEYSTATIC_SECRET - optional, set via: wrangler secret put KEYSTATIC_SECRET
