name = "vectoflare"
compatibility_date = "2026-06-05"
compatibility_flags = ["nodejs_compat"]
main = "@astrojs/cloudflare/entrypoints/server"

[assets]
directory = "./dist/client"
binding = "ASSETS"

# ─── AI Infrastructure ──────────────────────────────────────────
# Vectorize + AI bindings are injected by CI/CD into wrangler.ci.json
# during deployment. They are NOT declared here to avoid triggering
# @cloudflare/vite-plugin remote validation on static builds.
# See .github/workflows/actions.yaml → build-and-deploy step.
#
# For local development, use miniflare/mock bindings or set
# OPENAI_API_KEY which bypasses Workers AI entirely.

# ─── Environment Variables ──────────────────────────────────────

[vars]
NODE_VERSION = "22"
NODE_ENV = "development"
# OPENAI_API_KEY and SESSION_SECRET must be set via:
#   wrangler secret put OPENAI_API_KEY
#   wrangler secret put SESSION_SECRET
#   wrangler secret put KEYSTATIC_SECRET
# Or via Cloudflare Dashboard → Worker → Variables → Secrets
